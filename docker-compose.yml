version: '3.9'

services:

  # ──────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cs_postgres
    environment:
      POSTGRES_DB: companyscreener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cs_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: companyscreener
      DB_USER: postgres
      DB_PASSWORD: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGINS: http://localhost:4200,http://localhost:80
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ──────────────────────────────
  # Angular Frontend (Nginx)
  # ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cs_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
