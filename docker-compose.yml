services:

  # ──────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cs_postgres
    environment:
      POSTGRES_DB: companyscreener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cs_backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/companyscreener
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost,http://localhost:80
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ──────────────────────────────
  # Angular Frontend (Nginx)
  # ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cs_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
