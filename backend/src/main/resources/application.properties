# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:companyscreener}}
spring.datasource.username=${DATABASE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.validation-timeout=${HIKARI_VALIDATION_TIMEOUT_MS:2000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# "validate" - Hibernate checks schema matches entities (Flyway creates schema)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# ─── Spring SQL Initializer ───────────────────────────────────────────────────
# DISABLE - Flyway handles schema management
spring.sql.init.mode=${SQL_INIT_MODE:never}

# ─── Flyway ───────────────────────────────────────────────────────────────────
# ENABLE Flyway for schema management
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:1}

# ─── Groq AI API ──────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:${CORS_ORIGINS:http://localhost:4200}}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.example=${LOG_LEVEL_COM_EXAMPLE:INFO}
logging.level.org.springframework.jdbc=${LOG_LEVEL_SPRING_JDBC:WARN}
